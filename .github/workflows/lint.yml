name: CI Lint

on:
  push:
    branches: [ main, develop ]

  pull_request:
    branches: [ main, develop ]

jobs:
  powershell-lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install PSScriptAnalyzer
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
      
      - name: Analyze
        run: |
          $settingsPath = Join-Path ${{ github.workspace }} ".powershell-psscriptanalyzer.psd1"
          Write-Host "🔍 Checking settings at: $settingsPath"
          
          if (Test-Path $settingsPath) {
              Write-Host "✅ Config found. Running with custom settings..."
              $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings $settingsPath
          } else {
              Write-Host "⚠️ Config not found. Running with defaults..."
              $results = Invoke-ScriptAnalyzer -Path . -Recurse
          }

          if ($results -and $results.Count -gt 0) {
              $results | Format-Table RuleName, Severity, ScriptName, Line, Message
              throw "❌ PSScriptAnalyzer found $($results.Count) issue(s)"
          }
          Write-Host "✅ PSScriptAnalyzer: All checks passed!" -ForegroundColor Green