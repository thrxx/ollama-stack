name: CI Lint

on:
  push:
    branches: [ main, develop ]
    paths: [ '**.ps1' ]
  pull_request:
    branches: [ main ]
    paths: [ '**.ps1' ]

jobs:
  powershell-lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install PSScriptAnalyzer
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
      
      - name: Analyze
        run: |
          # Используем стандартные настройки без кастомного конфига
          $results = Invoke-ScriptAnalyzer -Path . -Recurse `
            -ExcludeRule PSAvoidUsingWriteHost,PSUseApprovedVerbs,PSUseShouldProcessForStateChangingFunctions
          
          if ($results) {
            $results | Format-Table
            throw "❌ Found $($results.Count) issues"
          }
          Write-Host "✅ PSScriptAnalyzer: все скрипты в порядке"