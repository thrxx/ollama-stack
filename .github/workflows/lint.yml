name: CI Lint

on:
  push:
    branches: [ main, develop ]
    paths: [ '**.ps1' ]
  pull_request:
    branches: [ main ]
    paths: [ '**.ps1' ]

jobs:
  powershell-lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Debug - Show repository files
        run: |
          Write-Host "=== Working directory: $(Get-Location) ==="
          Write-Host "`n=== All files in root ==="
          Get-ChildItem -Force | Select-Object Name
          Write-Host "`n=== Looking for .psd1 files ==="
          Get-ChildItem -Filter "*.psd1" -Recurse | ForEach-Object { Write-Host "Found: $($_.FullName)" }
      
      - name: Install PSScriptAnalyzer
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
      
      - name: Analyze
        run: |
          $configPath = ".powershell-psscriptanalyzer.psd1"
          Write-Host "`n=== Checking for config ==="
          Write-Host "Looking for: $configPath"
          Write-Host "Full path would be: $(Join-Path (Get-Location) $configPath)"
          $exists = Test-Path $configPath
          Write-Host "File exists: $exists"
          
          if ($exists) {
            Write-Host "`n=== Running PSScriptAnalyzer ==="
            $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings $configPath
            if ($results) {
              $results | Format-Table
              throw "❌ Found $($results.Count) issues"
            }
            Write-Host "✅ PSScriptAnalyzer: все скрипты в порядке"
          } else {
            Write-Warning "⚠️ Config file NOT found: $configPath"
            Write-Warning "⚠️ Running with default settings..."
            $results = Invoke-ScriptAnalyzer -Path . -Recurse
            if ($results) {
              $results | Format-Table
              throw "❌ Found $($results.Count) issues"
            }
          }